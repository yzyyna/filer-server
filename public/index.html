<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>File Server</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-color: #0a0a0c;
        --panel-bg: #141417;
        --accent: #00f2ff;
        --accent-glow: rgba(0, 242, 255, 0.3);
        --danger: #ff4d4d;
        --text-main: #e0e0e6;
        --text-dim: #88888f;
        --border: #2d2d33;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 2rem;
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        line-height: 1.5;
      }

      .container {
        max-width: 850px;
        margin: 2rem auto;
      }

      .panel {
        background: var(--panel-bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 2rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
        border-bottom: 1px solid var(--border);
        padding-bottom: 1rem;
      }

      h1 {
        margin: 0;
        font-size: 1.25rem;
        font-family: 'JetBrains Mono', monospace;
        letter-spacing: -0.5px;
        color: var(--accent);
        text-transform: uppercase;
      }

      /* === Dropzone === */
      .dropzone {
        border: 2px dashed var(--border);
        border-radius: 10px;
        padding: 3rem 1rem;
        text-align: center;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        background: rgba(255, 255, 255, 0.02);
        cursor: pointer;
      }

      .dropzone:hover,
      .dropzone.dragover {
        border-color: var(--accent);
        background: var(--accent-glow);
        transform: translateY(-2px);
      }

      .dropzone-text {
        display: block;
        color: var(--text-dim);
        margin-bottom: 1rem;
        font-size: 0.95rem;
      }

      .btn {
        font-family: inherit;
        font-weight: 600;
        padding: 0.6rem 1.2rem;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.2s;
        font-size: 0.85rem;
      }

      .btn-primary {
        background: var(--accent);
        color: #000;
        border: none;
      }

      .btn-primary:hover {
        filter: brightness(1.1);
        box-shadow: 0 0 15px var(--accent-glow);
      }

      /* === Progress === */
      .progress-container {
        margin: 1.5rem 0;
        display: none;
      }

      .progress-track {
        height: 6px;
        background: #222;
        border-radius: 10px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--accent), #00ffa2);
        box-shadow: 0 0 10px var(--accent-glow);
        transition: width 0.2s ease-out;
      }

      .progress-info {
        display: flex;
        justify-content: space-between;
        font-size: 0.75rem;
        margin-top: 0.5rem;
        color: var(--text-dim);
        font-family: 'JetBrains Mono', monospace;
      }

      /* === File List === */
      .file-list {
        margin-top: 2rem;
      }

      .file-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem;
        border-bottom: 1px solid var(--border);
        transition: background 0.2s;
      }

      .file-item:hover {
        background: rgba(255, 255, 255, 0.03);
      }

      .file-meta {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }

      .file-name {
        font-weight: 500;
        color: var(--text-main);
        word-break: break-all;
      }

      .file-details {
        font-size: 0.75rem;
        color: var(--text-dim);
        font-family: 'JetBrains Mono', monospace;
      }

      .actions {
        display: flex;
        gap: 0.75rem;
      }

      .action-link {
        color: var(--accent);
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 600;
      }

      .action-del {
        background: none;
        border: 1px solid rgba(255, 77, 77, 0.3);
        color: var(--danger);
        font-size: 0.75rem;
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        cursor: pointer;
      }

      .action-del:hover {
        background: var(--danger);
        color: white;
      }

      @media (max-width: 600px) {
        body {
          padding: 1rem;
        }
        .panel {
          padding: 1.25rem;
        }
        header {
          flex-direction: column;
          align-items: flex-start;
          gap: 0.5rem;
        }
        .file-item {
          flex-direction: column;
          align-items: flex-start;
          gap: 1rem;
        }
        .actions {
          width: 100%;
          justify-content: flex-end;
          gap: 1.5rem; /* More space between buttons */
        }
        /* Mobile Touch Optimization: Larger interactive areas */
        .action-link {
          font-size: 1.1rem;
          padding: 0.5rem 0;
        }
        .action-del {
          font-size: 1rem;
          padding: 0.4rem 0.8rem;
        }
      }

      /* === Breadcrumb === */
      .breadcrumb {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.3rem;
        margin-bottom: 1.5rem;
        padding: 0.5rem 0;
        border-bottom: 1px solid var(--border);
        font-size: 0.85rem;
      }

      .breadcrumb-link {
        color: var(--text-dim);
        text-decoration: none;
        font-family: 'JetBrains Mono', monospace;
        transition: color 0.2s;
        cursor: pointer;
      }

      .breadcrumb-link:hover {
        color: var(--accent);
      }

      .breadcrumb-sep {
        color: var(--border);
        font-family: 'JetBrains Mono', monospace;
      }

      /* === Directory Items === */
      .dir-item {
        cursor: pointer;
      }

      .dir-item:hover {
        background: var(--accent-glow);
      }

      .dir-item .file-name {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="panel">
        <header>
          <h1>File Explorer</h1>
          <div
            id="status-tag"
            style="
              font-size: 0.7rem;
              color: #444;
              font-family: 'JetBrains Mono';
            "
          >
            v1.0.0 - STABLE
          </div>
        </header>

        <div id="dropzone" class="dropzone">
          <span class="dropzone-text">Drop objects here or browse locally</span>
          <button class="btn btn-primary" onclick="fileInput.click()">
            Open Files
          </button>
          <input type="file" id="fileInput" multiple hidden />
        </div>

        <div class="progress-container" id="progress">
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-info">
            <span id="progressStatus">Transferring...</span>
            <span id="progressPercent">0%</span>
          </div>
        </div>

        <div class="breadcrumb" id="breadcrumb"></div>

        <div class="file-list" id="fileList">
          <!-- Files rendered here -->
        </div>
      </div>
    </div>

    <script>
      const fileInput = document.getElementById('fileInput')
      const dropzone = document.getElementById('dropzone')
      const progress = document.getElementById('progress')
      const progressFill = document.getElementById('progressFill')
      const progressStatus = document.getElementById('progressStatus')
      const progressPercent = document.getElementById('progressPercent')
      const breadcrumb = document.getElementById('breadcrumb')
      const fileList = document.getElementById('fileList')
      let pendingFiles = []
      let currentDir = ''

      function formatSize(bytes) {
        if (bytes === 0) return '0 B'
        const k = 1024
        const sizes = ['B', 'KB', 'MB', 'GB']
        const i = Math.floor(Math.log(bytes) / Math.log(k))
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i]
      }

      function escapeHtml(str) {
        const div = document.createElement('div')
        div.textContent = str
        return div.innerHTML
      }

      // --- Event: File input change ---
      fileInput.addEventListener('change', (e) => {
        pendingFiles = [...e.target.files]
        uploadFiles()
      })

      // --- Event: Drag & drop ---
      ;['dragover', 'dragleave', 'drop'].forEach((evt) => {
        dropzone.addEventListener(evt, (e) => {
          e.preventDefault()
          if (evt === 'dragover') dropzone.classList.add('dragover')
          else dropzone.classList.remove('dragover')
          if (evt === 'drop') {
            pendingFiles = [...e.dataTransfer.files]
            uploadFiles()
          }
        })
      })

      // --- Event: Breadcrumb click (delegation) ---
      breadcrumb.addEventListener('click', (e) => {
        const link = e.target.closest('.breadcrumb-link')
        if (link && link.dataset.dir !== undefined) {
          navigateTo(link.dataset.dir)
        }
      })

      // --- Event: File list click (delegation) ---
      fileList.addEventListener('click', (e) => {
        // Directory navigation
        const dirItem = e.target.closest('.dir-item')
        if (dirItem && dirItem.dataset.dir !== undefined) {
          navigateTo(dirItem.dataset.dir)
          return
        }
        // Delete button
        if (e.target.classList.contains('action-del')) {
          e.stopPropagation()
          del()
        }
      })

      // --- Upload files ---
      function uploadFiles() {
        if (!pendingFiles.length) return
        const form = new FormData()
        pendingFiles.forEach((f) => form.append('files', f))
        form.append('dir', currentDir)

        const xhr = new XMLHttpRequest()
        xhr.open('POST', '/api/upload')

        xhr.upload.onprogress = (e) => {
          if (e.lengthComputable) {
            const percent = Math.round((e.loaded / e.total) * 100)
            progress.style.display = 'block'
            progressFill.style.width = percent + '%'
            progressPercent.textContent = percent + '%'
            progressStatus.textContent = 'UPLOADING'
          }
        }

        xhr.onload = () => {
          progressStatus.textContent = 'SYNC COMPLETE'
          setTimeout(() => {
            progress.style.display = 'none'
            progressFill.style.width = '0%'
          }, 1500)
          loadFiles()
        }

        xhr.send(form)
      }

      // --- Navigate to directory ---
      function navigateTo(dir) {
        currentDir = dir
        loadFiles()
      }

      // --- Render breadcrumb ---
      function renderBreadcrumb(dir) {
        let html = `<a class="breadcrumb-link" data-dir="">📂 Root</a>`
        if (dir) {
          const parts = dir.split('/')
          let accumulated = ''
          parts.forEach((part) => {
            accumulated += (accumulated ? '/' : '') + part
            html += ` <span class="breadcrumb-sep">›</span> <a class="breadcrumb-link" data-dir="${escapeHtml(accumulated)}">${escapeHtml(part)}</a>`
          })
        }
        breadcrumb.innerHTML = html
      }

      // --- Load file list ---
      async function loadFiles() {
        try {
          const dirParam = currentDir ? `?dir=${encodeURIComponent(currentDir)}` : ''
          const res = await fetch('/api/files' + dirParam)
          if (!res.ok) {
            fileList.innerHTML = `<div class="file-item" style="justify-content:center;color:var(--danger)">Failed to load (${res.status})</div>`
            return
          }
          const data = await res.json()
          renderBreadcrumb(data.currentDir)

          fileList.innerHTML = ''

          // Parent directory (back) link
          if (data.parentDir !== null) {
            const div = document.createElement('div')
            div.className = 'file-item dir-item'
            div.dataset.dir = data.parentDir
            div.innerHTML = `
              <div class="file-meta">
                <span class="file-name">📁 ..</span>
                <span class="file-details">Parent Directory</span>
              </div>
            `
            fileList.appendChild(div)
          }

          // Items (directories + files)
          data.items.forEach((item) => {
            const div = document.createElement('div')

            if (item.type === 'directory') {
              const newDir = currentDir ? `${currentDir}/${item.name}` : item.name
              div.className = 'file-item dir-item'
              div.dataset.dir = newDir
              div.innerHTML = `
                <div class="file-meta">
                  <span class="file-name">📁 ${escapeHtml(item.name)}/</span>
                  <span class="file-details">Directory</span>
                </div>
                <div class="actions">
                  <span class="action-link">OPEN</span>
                </div>
              `
            } else {
              const d = new Date(item.time)
              const pad = (num) => String(num).padStart(2, '0')
              const timeStr = `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`
              const filePath = currentDir ? `${currentDir}/${item.name}` : item.name

              div.className = 'file-item'
              div.innerHTML = `
                <div class="file-meta">
                  <span class="file-name">📄 ${escapeHtml(item.name)}</span>
                  <span class="file-details">${formatSize(item.size)} ${timeStr}</span>
                </div>
                <div class="actions">
                  <a href="/api/download?path=${encodeURIComponent(filePath)}" class="action-link" target="_blank">DOWNLOAD</a>
                  <button class="action-del">DELETE</button>
                </div>
              `
            }

            fileList.appendChild(div)
          })

          if (data.items.length === 0 && data.parentDir === null) {
            fileList.innerHTML = '<div class="file-item" style="justify-content:center;color:var(--text-dim)">No files uploaded yet</div>'
          }
        } catch (err) {
          console.error('Fetch error:', err)
          fileList.innerHTML = '<div class="file-item" style="justify-content:center;color:var(--danger)">Connection error</div>'
        }
      }

      function del() {
        alert(
          'ACCESS DENIED: Please contact the system administrator to remove objects.'
        )
        loadFiles()
      }

      // Bootstrap
      loadFiles()
    </script>
  </body>
</html>
