<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>文件服务器</title>
    <style>
      body {
        margin: 0;
        padding: 40px;
        font-family: 'JetBrains Mono', monospace;
        color: #e5e5e5;
      }

      .panel {
        width: 760px;
        margin: auto;
        background: #111;
        border: 2px solid #444;
        border-radius: 8px;
        padding: 24px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
      }

      h2 {
        margin-top: 0;
        font-size: 22px;
        color: #00d4ff;
        border-bottom: 1px solid #333;
        padding-bottom: 10px;
      }

      .dropzone {
        border: 2px dashed #555;
        padding: 30px;
        text-align: center;
        border-radius: 8px;
        background: #181818;
        cursor: pointer;
        transition: 0.2s;
      }

      .dropzone.dragover {
        border-color: #00d4ff;
        background: #0f2a33;
      }

      .btn {
        padding: 8px 18px;
        border: 2px solid #00d4ff;
        background: transparent;
        color: #00d4ff;
        font-size: 14px;
        cursor: pointer;
        margin-top: 12px;
        transition: 0.2s;
      }

      .btn:hover {
        background: #00d4ff;
        color: #000;
      }

      #fileInput {
        display: none;
      }

      .progress {
        margin-top: 16px;
        display: none;
      }

      .progress-bar-bg {
        width: 100%;
        height: 10px;
        background: #333;
        border-radius: 4px;
        overflow: hidden;
      }

      .progress-bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #00d4ff, #00ffa2);
        transition: width 0.1s linear;
      }

      ul {
        list-style: none;
        padding: 0;
        margin-top: 20px;
      }

      .file-row {
        padding: 10px;
        border-bottom: 1px solid #333;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .file-actions a,
      .file-actions button {
        color: #00ffa2;
        background: none;
        border: none;
        cursor: pointer;
        font-size: 13px;
        margin-left: 10px;
      }

      .file-actions button {
        color: #ff4d4d;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h2>Node File System</h2>

      <div id="dropzone" class="dropzone">
        拖拽文件到这里 或 点击选择(支持多文件)
        <br />
        <button class="btn" onclick="fileInput.click()">选择文件</button>
        <input type="file" id="fileInput" multiple />
      </div>

      <div class="progress" id="progress">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div
          id="progressText"
          style="margin-top: 6px; font-size: 12px; color: #aaa"
        ></div>
      </div>

      <ul id="fileList"></ul>
    </div>

    <script>
      function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B'
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB'
        if (bytes < 1024 * 1024 * 1024)
          return (bytes / 1024 / 1024).toFixed(1) + ' MB'
        return (bytes / 1024 / 1024 / 1024).toFixed(1) + ' GB'
      }

      const fileInput = document.getElementById('fileInput')
      const dropzone = document.getElementById('dropzone')
      const progress = document.getElementById('progress')
      const progressFill = document.getElementById('progressFill')
      const progressText = document.getElementById('progressText')

      let pendingFiles = []

      fileInput.addEventListener('change', (e) => {
        pendingFiles = [...e.target.files]
        uploadFiles()
      })

      dropzone.addEventListener('dragover', (e) => {
        e.preventDefault()
        dropzone.classList.add('dragover')
      })

      dropzone.addEventListener('dragleave', () => {
        dropzone.classList.remove('dragover')
      })

      dropzone.addEventListener('drop', (e) => {
        e.preventDefault()
        dropzone.classList.remove('dragover')
        pendingFiles = [...e.dataTransfer.files]
        uploadFiles()
      })

      function uploadFiles() {
        if (pendingFiles.length === 0) return

        const form = new FormData()
        pendingFiles.forEach((f) => form.append('files', f))

        const xhr = new XMLHttpRequest()
        xhr.open('POST', '/api/upload')

        xhr.upload.onprogress = (e) => {
          if (e.lengthComputable) {
            const percent = Math.round((e.loaded / e.total) * 100)
            progress.style.display = 'block'
            progressFill.style.width = percent + '%'
            progressText.textContent = `上传中... ${percent}%`
          }
        }

        xhr.onload = () => {
          progressText.textContent = '上传完成'
          setTimeout(() => {
            progress.style.display = 'none'
            progressFill.style.width = '0%'
          }, 800)
          loadFiles()
        }

        xhr.send(form)
      }

      async function loadFiles() {
        const res = await fetch('/api/files')
        const files = await res.json()

        // 按时间排序（最新在前）
        files.sort((a, b) => b.time - a.time)

        const list = document.getElementById('fileList')
        list.innerHTML = ''

        files.forEach((file) => {
          const sizeStr = formatSize(file.size)
          const timeStr = new Date(file.time).toLocaleString()

          const li = document.createElement('li')
          li.className = 'file-row'

          li.innerHTML = `
      <span>
        ${file.name}
        <br>
        <span style="font-size:12px;color:#888">
          ${sizeStr} · ${timeStr}
        </span>
      </span>

      <span class="file-actions">
        <a href="/api/download/${file.name}" target="_blank">下载</a>
        <button onclick="del('${file.name}')">删除</button>
      </span>
    `

          list.appendChild(li)
        })
      }

      async function del(name) {
        await fetch('/api/delete/' + name, { method: 'DELETE' })
        loadFiles()
      }

      loadFiles()
    </script>
  </body>
</html>
