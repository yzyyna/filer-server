<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>File Server</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-color: #0a0a0c;
        --panel-bg: #141417;
        --accent: #00f2ff;
        --accent-glow: rgba(0, 242, 255, 0.3);
        --danger: #ff4d4d;
        --text-main: #e0e0e6;
        --text-dim: #88888f;
        --border: #2d2d33;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 2rem;
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        line-height: 1.5;
      }

      .container {
        max-width: 850px;
        margin: 2rem auto;
      }

      .panel {
        background: var(--panel-bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 2rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
        border-bottom: 1px solid var(--border);
        padding-bottom: 1rem;
      }

      h1 {
        margin: 0;
        font-size: 1.25rem;
        font-family: 'JetBrains Mono', monospace;
        letter-spacing: -0.5px;
        color: var(--accent);
        text-transform: uppercase;
      }

      /* === Dropzone === */
      .dropzone {
        border: 2px dashed var(--border);
        border-radius: 10px;
        padding: 3rem 1rem;
        text-align: center;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        background: rgba(255, 255, 255, 0.02);
        cursor: pointer;
      }

      .dropzone:hover,
      .dropzone.dragover {
        border-color: var(--accent);
        background: var(--accent-glow);
        transform: translateY(-2px);
      }

      /* 主目录禁用上传状态 */
      .dropzone.disabled {
        opacity: 0.4;
        cursor: not-allowed;
        pointer-events: none;
        border-style: dotted;
      }

      .dropzone.disabled .btn-primary {
        filter: grayscale(0.6);
      }

      .dropzone-text {
        display: block;
        color: var(--text-dim);
        margin-bottom: 1rem;
        font-size: 0.95rem;
      }

      .btn {
        font-family: inherit;
        font-weight: 600;
        padding: 0.6rem 1.2rem;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.2s;
        font-size: 0.85rem;
      }

      .btn-primary {
        background: var(--accent);
        color: #000;
        border: none;
      }

      .btn-primary:hover {
        filter: brightness(1.1);
        box-shadow: 0 0 15px var(--accent-glow);
      }

      /* === Progress === */
      .progress-container {
        margin: 1.5rem 0;
        display: none;
      }

      .progress-track {
        height: 6px;
        background: #222;
        border-radius: 10px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--accent), #00ffa2);
        box-shadow: 0 0 10px var(--accent-glow);
        transition: width 0.2s ease-out;
      }

      .progress-info {
        display: flex;
        justify-content: space-between;
        font-size: 0.75rem;
        margin-top: 0.5rem;
        color: var(--text-dim);
        font-family: 'JetBrains Mono', monospace;
      }

      /* === File List === */
      .file-list {
        margin-top: 2rem;
      }

      .file-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem;
        border-bottom: 1px solid var(--border);
        transition: background 0.2s;
      }

      .file-item:hover {
        background: rgba(255, 255, 255, 0.03);
      }

      .file-meta {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }

      .file-name {
        font-weight: 500;
        color: var(--text-main);
        word-break: break-all;
      }

      .file-details {
        font-size: 0.75rem;
        color: var(--text-dim);
        font-family: 'JetBrains Mono', monospace;
      }

      .actions {
        display: flex;
        gap: 0.75rem;
      }

      .action-link {
        color: var(--accent);
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 600;
      }

      .action-del {
        background: none;
        border: 1px solid rgba(255, 77, 77, 0.3);
        color: var(--danger);
        font-size: 0.75rem;
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        cursor: pointer;
      }

      .action-del:hover {
        background: var(--danger);
        color: white;
      }

      @media (max-width: 600px) {
        body {
          padding: 1rem;
        }
        .panel {
          padding: 1.25rem;
        }
        header {
          flex-direction: column;
          align-items: flex-start;
          gap: 0.5rem;
        }
        .file-item {
          flex-direction: column;
          align-items: flex-start;
          gap: 1rem;
        }
        .actions {
          width: 100%;
          justify-content: flex-end;
          gap: 1.5rem; /* More space between buttons */
        }
        /* Mobile Touch Optimization: Larger interactive areas */
        .action-link {
          font-size: 1rem;
          padding: 0.5rem 0;
        }
        .action-preview {
          font-size: 1rem;
          padding: 0.5rem 0;
        }
        .action-del {
          font-size: 0.95rem;
          padding: 0.4rem 0.7rem;
        }
        .action-copy {
          font-size: 0.9rem;
          padding: 0.4rem 0.7rem;
        }
        .actions {
          gap: 1rem;
          flex-wrap: wrap;
        }
      }

      /* === Breadcrumb === */
      .breadcrumb {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.3rem;
        margin-bottom: 1.5rem;
        padding: 0.5rem 0;
        border-bottom: 1px solid var(--border);
        font-size: 0.85rem;
      }

      .breadcrumb-link {
        color: var(--text-dim);
        text-decoration: none;
        font-family: 'JetBrains Mono', monospace;
        transition: color 0.2s;
        cursor: pointer;
      }

      .breadcrumb-link:hover {
        color: var(--accent);
      }

      .breadcrumb-sep {
        color: var(--border);
        font-family: 'JetBrains Mono', monospace;
      }

      /* === Directory Items === */
      .dir-item {
        cursor: pointer;
      }

      .dir-item:hover {
        background: var(--accent-glow);
      }

      .dir-item .file-name {
        color: var(--accent);
      }

      /* === Action Buttons (Preview / Copy) === */
      .action-preview {
        color: #00ffa2;
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
      }

      .action-copy {
        background: none;
        border: 1px solid rgba(0, 242, 255, 0.3);
        color: var(--accent);
        font-size: 0.75rem;
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        cursor: pointer;
        font-family: inherit;
        transition: 0.2s;
      }

      .action-copy:hover {
        background: var(--accent);
        color: #000;
      }

      /* === Preview Modal === */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(6px);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .modal-overlay.active {
        display: flex;
      }

      .modal-content {
        position: relative;
        max-width: 95vw;
        max-height: 90vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }

      .modal-content img,
      .modal-content video {
        max-width: 95vw;
        max-height: 80vh;
        border-radius: 8px;
        box-shadow: 0 0 30px var(--accent-glow);
        object-fit: contain;
      }

      .modal-close {
        position: absolute;
        top: -2.5rem;
        right: 0;
        background: none;
        border: 1px solid var(--border);
        color: var(--text-main);
        width: 2rem;
        height: 2rem;
        border-radius: 50%;
        cursor: pointer;
        font-size: 1rem;
        transition: 0.2s;
      }

      .modal-close:hover {
        background: var(--danger);
        border-color: var(--danger);
        color: white;
      }

      .modal-title {
        color: var(--accent);
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        word-break: break-all;
        text-align: center;
        max-width: 90vw;
      }

      /* === Toast === */
      .toast {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        background: var(--panel-bg);
        border: 1px solid var(--accent);
        color: var(--accent);
        padding: 0.75rem 1.5rem;
        border-radius: 8px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        box-shadow: 0 0 20px var(--accent-glow);
        z-index: 2000;
        animation: toast-in 0.3s ease-out;
      }

      @keyframes toast-in {
        from {
          opacity: 0;
          transform: translateX(-50%) translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="panel">
        <header>
          <h1>File Explorer</h1>
          <div
            id="status-tag"
            style="
              font-size: 0.7rem;
              color: #444;
              font-family: 'JetBrains Mono';
            "
          >
            v1.0.0 - STABLE
          </div>
        </header>

        <div id="dropzone" class="dropzone">
          <span class="dropzone-text">Drop objects here or browse locally</span>
          <button class="btn btn-primary" onclick="fileInput.click()">
            Open Files
          </button>
          <input type="file" id="fileInput" multiple hidden />
        </div>

        <div class="progress-container" id="progress">
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-info">
            <span id="progressStatus">Transferring...</span>
            <span id="progressPercent">0%</span>
          </div>
        </div>

        <div class="breadcrumb" id="breadcrumb"></div>

        <div class="file-list" id="fileList">
          <!-- Files rendered here -->
        </div>
      </div>
    </div>

    <!-- Preview Modal -->
    <div class="modal-overlay" id="previewModal">
      <div class="modal-content">
        <button class="modal-close" id="modalClose">✕</button>
        <div class="modal-title" id="modalTitle"></div>
        <div id="modalBody"></div>
      </div>
    </div>

    <script>
      const fileInput = document.getElementById('fileInput')
      const dropzone = document.getElementById('dropzone')
      const progress = document.getElementById('progress')
      const progressFill = document.getElementById('progressFill')
      const progressStatus = document.getElementById('progressStatus')
      const progressPercent = document.getElementById('progressPercent')
      const breadcrumb = document.getElementById('breadcrumb')
      const fileList = document.getElementById('fileList')
      let pendingFiles = []
      let currentDir = ''

      function formatSize(bytes) {
        if (bytes === 0) return '0 B'
        const k = 1024
        const sizes = ['B', 'KB', 'MB', 'GB']
        const i = Math.floor(Math.log(bytes) / Math.log(k))
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i]
      }

      function escapeHtml(str) {
        const div = document.createElement('div')
        div.textContent = str
        return div.innerHTML
      }

      // --- 可预览文件类型识别 ---
      const PREVIEW_TYPES = {
        image: ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'bmp', 'ico'],
        video: ['mp4', 'webm', 'ogg', 'ogv', 'mov', 'm4v'],
        audio: ['mp3', 'wav', 'ogg', 'm4a', 'flac', 'aac'],
        pdf: ['pdf'],
        text: ['txt', 'md', 'json', 'js', 'css', 'html', 'xml', 'csv', 'log', 'yaml', 'yml']
      }

      function getPreviewType(filename) {
        const ext = filename.split('.').pop().toLowerCase()
        for (const [type, exts] of Object.entries(PREVIEW_TYPES)) {
          if (exts.includes(ext)) return type
        }
        return null
      }

      function buildPreviewUrl(filePath) {
        return `${window.location.origin}/api/preview?path=${encodeURIComponent(filePath)}`
      }

      function buildDownloadUrl(filePath) {
        return `${window.location.origin}/api/download?path=${encodeURIComponent(filePath)}`
      }

      // --- Toast 提示 ---
      function showToast(message) {
        const existing = document.querySelector('.toast')
        if (existing) existing.remove()
        const toast = document.createElement('div')
        toast.className = 'toast'
        toast.textContent = message
        document.body.appendChild(toast)
        setTimeout(() => toast.remove(), 2000)
      }

      // --- 复制链接（统一入口，支持 download / preview 两种类型）---
      function copyLink(filePath, type) {
        const isDownload = type === 'download'
        const url = isDownload ? buildDownloadUrl(filePath) : buildPreviewUrl(filePath)
        const successMsg = isDownload ? '✓ Download link copied' : '✓ Preview link copied'
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(url).then(() => {
            showToast(successMsg)
          }).catch(() => {
            fallbackCopy(url, successMsg)
          })
        } else {
          fallbackCopy(url, successMsg)
        }
      }

      function fallbackCopy(text, successMsg) {
        const ta = document.createElement('textarea')
        ta.value = text
        ta.style.position = 'fixed'
        ta.style.opacity = '0'
        document.body.appendChild(ta)
        ta.select()
        try {
          document.execCommand('copy')
          showToast(successMsg || '✓ Link copied')
        } catch (e) {
          showToast('✗ Copy failed')
        }
        ta.remove()
      }

      // --- 预览模态框 ---
      const previewModal = document.getElementById('previewModal')
      const modalTitle = document.getElementById('modalTitle')
      const modalBody = document.getElementById('modalBody')
      const modalClose = document.getElementById('modalClose')

      modalClose.addEventListener('click', closePreview)
      previewModal.addEventListener('click', (e) => {
        if (e.target === previewModal) closePreview()
      })
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && previewModal.classList.contains('active')) closePreview()
      })

      function closePreview() {
        previewModal.classList.remove('active')
        modalBody.innerHTML = ''
        modalTitle.textContent = ''
      }

      function openPreview(filePath, fileName, previewType) {
        const url = buildPreviewUrl(filePath)
        modalTitle.textContent = fileName
        modalBody.innerHTML = ''

        if (previewType === 'image') {
          const img = document.createElement('img')
          img.src = url
          img.alt = fileName
          modalBody.appendChild(img)
        } else if (previewType === 'video') {
          const video = document.createElement('video')
          video.src = url
          video.controls = true
          video.autoplay = true
          modalBody.appendChild(video)
        } else if (previewType === 'audio') {
          const audio = document.createElement('audio')
          audio.src = url
          audio.controls = true
          audio.autoplay = true
          modalBody.appendChild(audio)
        } else if (previewType === 'pdf') {
          // PDF 在新标签页打开，避免模态框空间不足
          window.open(url, '_blank')
          return
        } else if (previewType === 'text') {
          // 文本类预览：拉取内容并显示
          fetch(url).then(r => r.text()).then(text => {
            const pre = document.createElement('pre')
            pre.style.cssText = 'max-width:90vw;max-height:75vh;overflow:auto;background:#0a0a0c;padding:1rem;border-radius:8px;color:var(--text-main);font-family:JetBrains Mono,monospace;font-size:0.8rem;border:1px solid var(--border);'
            pre.textContent = text
            modalBody.appendChild(pre)
          }).catch(() => showToast('✗ Preview failed'))
        }

        previewModal.classList.add('active')
      }

      // --- Event: File input change ---
      fileInput.addEventListener('change', (e) => {
        pendingFiles = [...e.target.files]
        uploadFiles()
      })

      // --- Event: Drag & drop ---
      ;['dragover', 'dragleave', 'drop'].forEach((evt) => {
        dropzone.addEventListener(evt, (e) => {
          e.preventDefault()
          if (dropzone.classList.contains('disabled')) return
          if (evt === 'dragover') dropzone.classList.add('dragover')
          else dropzone.classList.remove('dragover')
          if (evt === 'drop') {
            pendingFiles = [...e.dataTransfer.files]
            uploadFiles()
          }
        })
      })

      // --- Event: Breadcrumb click (delegation) ---
      breadcrumb.addEventListener('click', (e) => {
        const link = e.target.closest('.breadcrumb-link')
        if (link && link.dataset.dir !== undefined) {
          navigateTo(link.dataset.dir)
        }
      })

      // --- Event: File list click (delegation) ---
      fileList.addEventListener('click', (e) => {
        // Directory navigation
        const dirItem = e.target.closest('.dir-item')
        if (dirItem && dirItem.dataset.dir !== undefined) {
          navigateTo(dirItem.dataset.dir)
          return
        }
        // Preview button
        if (e.target.classList.contains('action-preview')) {
          e.stopPropagation()
          const path = e.target.dataset.path
          const name = e.target.dataset.name
          const type = e.target.dataset.type
          openPreview(path, name, type)
          return
        }
        // Copy link button (download or preview)
        if (e.target.classList.contains('action-copy')) {
          e.stopPropagation()
          copyLink(e.target.dataset.path, e.target.dataset.type)
          return
        }
        // Delete button
        if (e.target.classList.contains('action-del')) {
          e.stopPropagation()
          del()
        }
      })

      // --- Upload files ---
      function uploadFiles() {
        if (!pendingFiles.length) return
        // 权限控制：禁止在主目录上传
        if (!currentDir) {
          showToast('✗ 请先进入子文件夹再上传')
          pendingFiles = []
          if (fileInput.value) fileInput.value = ''
          return
        }
        const form = new FormData()
        pendingFiles.forEach((f) => form.append('files', f))
        form.append('dir', currentDir)

        const xhr = new XMLHttpRequest()
        xhr.open('POST', '/api/upload')

        xhr.upload.onprogress = (e) => {
          if (e.lengthComputable) {
            const percent = Math.round((e.loaded / e.total) * 100)
            progress.style.display = 'block'
            progressFill.style.width = percent + '%'
            progressPercent.textContent = percent + '%'
            progressStatus.textContent = 'UPLOADING'
          }
        }

        xhr.onload = () => {
          progressStatus.textContent = 'SYNC COMPLETE'
          setTimeout(() => {
            progress.style.display = 'none'
            progressFill.style.width = '0%'
          }, 1500)
          loadFiles()
        }

        xhr.send(form)
      }

      // --- Navigate to directory ---
      function navigateTo(dir) {
        currentDir = dir
        loadFiles()
      }

      // --- Render breadcrumb ---
      function renderBreadcrumb(dir) {
        let html = `<a class="breadcrumb-link" data-dir="">📂 Root</a>`
        if (dir) {
          const parts = dir.split('/')
          let accumulated = ''
          parts.forEach((part) => {
            accumulated += (accumulated ? '/' : '') + part
            html += ` <span class="breadcrumb-sep">›</span> <a class="breadcrumb-link" data-dir="${escapeHtml(accumulated)}">${escapeHtml(part)}</a>`
          })
        }
        breadcrumb.innerHTML = html
      }

      // --- Load file list ---
      async function loadFiles() {
        try {
          const dirParam = currentDir ? `?dir=${encodeURIComponent(currentDir)}` : ''
          const res = await fetch('/api/files' + dirParam)
          if (!res.ok) {
            fileList.innerHTML = `<div class="file-item" style="justify-content:center;color:var(--danger)">Failed to load (${res.status})</div>`
            return
          }
          const data = await res.json()
          renderBreadcrumb(data.currentDir)

          // 根据当前目录切换 dropzone 上传权限
          const dropzoneText = document.querySelector('.dropzone-text')
          if (data.currentDir) {
            dropzone.classList.remove('disabled')
            dropzoneText.textContent = `上传到: ${data.currentDir} （拖放或点击选择）`
            dropzoneText.style.color = 'var(--text-dim)'
          } else {
            dropzone.classList.add('disabled')
            dropzoneText.textContent = '请先进入子文件夹再上传文件（主目录禁止上传）'
            dropzoneText.style.color = 'var(--danger)'
          }

          fileList.innerHTML = ''

          // Parent directory (back) link
          if (data.parentDir !== null) {
            const div = document.createElement('div')
            div.className = 'file-item dir-item'
            div.dataset.dir = data.parentDir
            div.innerHTML = `
              <div class="file-meta">
                <span class="file-name">📁 ..</span>
                <span class="file-details">Parent Directory</span>
              </div>
            `
            fileList.appendChild(div)
          }

          // Items (directories + files)
          data.items.forEach((item) => {
            const div = document.createElement('div')

            if (item.type === 'directory') {
              const newDir = currentDir ? `${currentDir}/${item.name}` : item.name
              div.className = 'file-item dir-item'
              div.dataset.dir = newDir
              div.innerHTML = `
                <div class="file-meta">
                  <span class="file-name">📁 ${escapeHtml(item.name)}/</span>
                  <span class="file-details">Directory</span>
                </div>
                <div class="actions">
                  <span class="action-link">OPEN</span>
                </div>
              `
            } else {
              const d = new Date(item.time)
              const pad = (num) => String(num).padStart(2, '0')
              const timeStr = `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`
              const filePath = currentDir ? `${currentDir}/${item.name}` : item.name
              const previewType = getPreviewType(item.name)
              const icon = previewType === 'image' ? '🖼️' : previewType === 'video' ? '🎬' : previewType === 'audio' ? '🎵' : previewType === 'pdf' ? '📕' : previewType === 'text' ? '📝' : '📄'

              div.className = 'file-item'
              // 可预览文件复制预览链接（点击进入预览页面），不可预览文件复制下载链接
              const copyType = previewType ? 'preview' : 'download'
              const copyTitle = previewType ? 'Copy preview link' : 'Copy download link'
              let actionsHtml = `<a href="/api/download?path=${encodeURIComponent(filePath)}" class="action-link" target="_blank">DOWNLOAD</a>`
              actionsHtml += `<button class="action-copy" data-path="${escapeHtml(filePath)}" data-type="${copyType}" title="${copyTitle}">COPY LINK</button>`
              if (previewType) {
                actionsHtml += `<a class="action-preview" data-path="${escapeHtml(filePath)}" data-name="${escapeHtml(item.name)}" data-type="${previewType}">PREVIEW</a>`
              }
              actionsHtml += `<button class="action-del">DELETE</button>`

              div.innerHTML = `
                <div class="file-meta">
                  <span class="file-name">${icon} ${escapeHtml(item.name)}</span>
                  <span class="file-details">${formatSize(item.size)} ${timeStr}</span>
                </div>
                <div class="actions">
                  ${actionsHtml}
                </div>
              `
            }

            fileList.appendChild(div)
          })

          if (data.items.length === 0 && data.parentDir === null) {
            fileList.innerHTML = '<div class="file-item" style="justify-content:center;color:var(--text-dim)">No files uploaded yet</div>'
          }
        } catch (err) {
          console.error('Fetch error:', err)
          fileList.innerHTML = '<div class="file-item" style="justify-content:center;color:var(--danger)">Connection error</div>'
        }
      }

      function del() {
        alert(
          'ACCESS DENIED: Please contact the system administrator to remove objects.'
        )
        loadFiles()
      }

      // Bootstrap
      loadFiles()
    </script>
  </body>
</html>
